<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión de Audiencias</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr); /* 7 columnas exactas */
            width: 100%;
            border-left: 1px solid #e5e7eb;
            border-top: 1px solid #e5e7eb;
            background-color: #e5e7eb; /* Color de las líneas divisorias */
            gap: 1px; /* Espacio para simular bordes internos */
        }
        .calendar-day {
            min-height: 120px;
            padding: 8px;
            background-color: #fff;
            display: flex;
            flex-direction: column;
            transition: background-color 0.2s;
        }
        .day-header {
            font-size: 0.75rem;
            font-weight: bold;
            color: #6b7280;
            text-align: right;
            margin-bottom: 4px;
        }
        .event-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .event-card {
            font-size: 0.7rem;
            line-height: 1.2;
            padding: 4px 6px;
            border-radius: 4px;
            background-color: #eff6ff;
            border: 1px solid #bfdbfe;
            color: #1e40af;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.2s ease;
        }
        .event-card:hover {
            white-space: normal;
            background-color: #dbeafe;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            position: relative;
            z-index: 10;
        }
        .current-day {
            background-color: #fefce8;
        }
        .other-month {
            background-color: #f9fafb;
            color: #d1d5db;
        }
        .loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.9);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-900">

<div id="loading" class="loading-overlay">
    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"></div>
    <div class="text-sm font-medium text-gray-600">Sincronizando audiencias...</div>
</div>

<input type="hidden" id="csvUrl" value="https://docs.google.com/spreadsheets/d/e/2PACX-1vTiYlQcx2Ix6HBhosnbGJH4oEG_A6faRFZRK1v5gfMHNxuqwJidrIIHVlX9EMbvV8MQbaxGWbE_45jd/pub?gid=0&single=true&output=csv" />

<div class="max-w-[1400px] mx-auto p-4">
    <header class="flex flex-col md:flex-row justify-between items-center mb-6 bg-white p-4 rounded-xl shadow-sm gap-4 border border-gray-200">
        <div>
            <h1 class="text-2xl font-bold text-slate-800">Calendario de Audiencias</h1>
            <p id="currentMonthDisplay" class="text-blue-600 font-medium tracking-tight uppercase"></p>
        </div>
        
        <div class="flex items-center gap-2">
            <button onclick="changeMonth(-1)" class="p-2 hover:bg-gray-100 rounded-full transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <button onclick="setToday()" class="px-4 py-2 border rounded-md text-sm hover:bg-gray-50 font-medium bg-white">Hoy</button>
            <button onclick="changeMonth(1)" class="p-2 hover:bg-gray-100 rounded-full transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
        </div>

        <div class="hidden md:block text-right">
            <span class="text-[10px] text-gray-400 bg-gray-50 px-2 py-1 rounded border uppercase font-bold tracking-tighter">Sincronización en Tiempo Real</span>
        </div>
    </header>

    <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6 bg-white p-4 rounded-xl shadow-sm border border-gray-200">
        <div>
            <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Juez</label>
            <select id="filterJuez" onchange="applyFilters()" class="w-full border p-2 rounded-md text-sm bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none"></select>
        </div>
        <div>
            <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Fiscal</label>
            <select id="filterFiscal" onchange="applyFilters()" class="w-full border p-2 rounded-md text-sm bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none"></select>
        </div>
        <div>
            <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">MPD</label>
            <select id="filterMPD" onchange="applyFilters()" class="w-full border p-2 rounded-md text-sm bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none"></select>
        </div>
        <div>
            <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Abog. Partic.</label>
            <select id="filterAbog" onchange="applyFilters()" class="w-full border p-2 rounded-md text-sm bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none"></select>
        </div>
    </section>

    <div class="bg-white rounded-xl shadow-xl overflow-hidden border border-gray-200">
        <div class="grid grid-cols-7 bg-gray-100 border-b border-gray-200">
            <div class="py-3 text-center text-[10px] font-bold text-gray-500 uppercase">Dom</div>
            <div class="py-3 text-center text-[10px] font-bold text-gray-500 uppercase">Lun</div>
            <div class="py-3 text-center text-[10px] font-bold text-gray-500 uppercase">Mar</div>
            <div class="py-3 text-center text-[10px] font-bold text-gray-500 uppercase">Mié</div>
            <div class="py-3 text-center text-[10px] font-bold text-gray-500 uppercase">Jue</div>
            <div class="py-3 text-center text-[10px] font-bold text-gray-500 uppercase">Vie</div>
            <div class="py-3 text-center text-[10px] font-bold text-gray-500 uppercase">Sáb</div>
        </div>
        <div id="calendarGrid" class="calendar-grid"></div>
    </div>
</div>

<div id="modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-[100]">
    <div class="bg-white rounded-2xl max-w-lg w-full p-6 shadow-2xl transform transition-all scale-95 opacity-0" id="modalContainer">
        <div class="flex justify-between items-start mb-4 border-b pb-4">
            <div>
                <h2 id="modalTitle" class="text-xl font-bold text-slate-800"></h2>
                <p id="modalSubtitle" class="text-sm text-blue-600 font-medium"></p>
            </div>
            <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
        </div>
        <div id="modalContent" class="grid grid-cols-1 gap-4 max-h-[60vh] overflow-y-auto pr-2"></div>
        <button onclick="closeModal()" class="mt-6 w-full bg-slate-800 text-white hover:bg-slate-900 py-3 rounded-xl font-bold transition-colors">Cerrar</button>
    </div>
</div>

<script>
    let allAudiencias = [];
    let currentViewDate = new Date();
    const fields = ["CUIJ", "IMPUTADO", "TIPO DE AUDIENCIA", "FECHA AGENDAMIENTO", "HORA PROGRAMADA INICIO", "SALA", "UBICACION IMPUTADO", "JUEZ", "FISCAL", "MPD", "ABOG. PARTIC."];

    async function fetchData() {
        const loading = document.getElementById('loading');
        loading.style.display = 'flex';
        try {
            const url = document.getElementById('csvUrl').value;
            const res = await fetch(url);
            const text = await res.text();
            const rows = parseCsv(text);
            const headers = rows[0].map(h => h.trim().toUpperCase());
            allAudiencias = rows.slice(1).map(row => {
                let obj = {};
                headers.forEach((h, i) => { obj[h] = row[i] ? row[i].trim() : ""; });
                return obj;
            }).filter(a => a["FECHA AGENDAMIENTO"]);
            populateFilters();
            renderCalendar();
        } catch (e) { console.error(e); }
        loading.style.display = 'none';
    }

    function parseCsv(text) {
        const rows = [];
        const lines = text.split(/\r?\n/);
        lines.forEach(line => {
            if (!line.trim()) return;
            const row = [];
            let inQuotes = false;
            let current = '';
            for (let i = 0; i < line.length; i++) {
                if (line[i] === '"') inQuotes = !inQuotes;
                else if (line[i] === ',' && !inQuotes) { row.push(current); current = ''; }
                else current += line[i];
            }
            row.push(current);
            rows.push(row);
        });
        return rows;
    }

    function splitNames(val) { return val ? val.split(',').map(n => n.trim()).filter(n => n.length > 2) : []; }

    function populateFilters() {
        const config = { 'filterJuez': 'JUEZ', 'filterFiscal': 'FISCAL', 'filterMPD': 'MPD', 'filterAbog': 'ABOG. PARTIC.' };
        Object.entries(config).forEach(([id, field]) => {
            const select = document.getElementById(id);
            const names = new Set();
            allAudiencias.forEach(a => splitNames(a[field]).forEach(n => names.add(n)));
            select.innerHTML = '<option value="">Todos</option>' + [...names].sort().map(n => `<option value="${n}">${n}</option>`).join('');
        });
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';
        const y = currentViewDate.getFullYear();
        const m = currentViewDate.getMonth();
        document.getElementById('currentMonthDisplay').innerText = new Intl.DateTimeFormat('es-ES', { month: 'long', year: 'numeric' }).format(currentViewDate);

        const firstDay = new Date(y, m, 1).getDay(); // 0=Dom, 1=Lun...
        const daysInMonth = new Date(y, m + 1, 0).getDate();
        const prevMonthLast = new Date(y, m, 0).getDate();

        const filters = {
            j: document.getElementById('filterJuez').value,
            f: document.getElementById('filterFiscal').value,
            m: document.getElementById('filterMPD').value,
            a: document.getElementById('filterAbog').value
        };

        const filtered = allAudiencias.filter(a => {
            const match = (f, v) => !f || splitNames(v).includes(f);
            return match(filters.j, a['JUEZ']) && match(filters.f, a['FISCAL']) && match(filters.m, a['MPD']) && match(filters.a, a['ABOG. PARTIC.']);
        });

        // Días mes anterior
        for (let i = firstDay - 1; i >= 0; i--) createCell(prevMonthLast - i, true);
        
        // Días mes actual
        for (let i = 1; i <= daysInMonth; i++) {
            const evs = filtered.filter(a => {
                const parts = a['FECHA AGENDAMIENTO'].includes('-') ? a['FECHA AGENDAMIENTO'].split('-') : a['FECHA AGENDAMIENTO'].split('/');
                const [d, mon, yr] = a['FECHA AGENDAMIENTO'].includes('/') ? [parts[0], parts[1], parts[2]] : [parts[2], parts[1], parts[0]];
                return parseInt(yr) === y && parseInt(mon) === (m + 1) && parseInt(d) === i;
            }).sort((a,b) => (a['HORA PROGRAMADA INICIO'] || "").localeCompare(b['HORA PROGRAMADA INICIO'] || ""));
            createCell(i, false, evs);
        }

        // Rellenar hasta completar la última semana
        const totalCells = firstDay + daysInMonth;
        const remaining = (7 - (totalCells % 7)) % 7;
        for (let i = 1; i <= remaining; i++) createCell(i, true);
    }

    function createCell(num, isOther, evs = []) {
        const cell = document.createElement('div');
        cell.className = `calendar-day ${isOther ? 'other-month' : ''}`;
        const today = new Date();
        if (!isOther && num === today.getDate() && currentViewDate.getMonth() === today.getMonth() && currentViewDate.getFullYear() === today.getFullYear()) cell.classList.add('current-day');
        
        cell.innerHTML = `<div class="day-header">${num}</div><div class="event-container"></div>`;
        const container = cell.querySelector('.event-container');
        evs.forEach(ev => {
            const el = document.createElement('div');
            el.className = 'event-card';
            el.innerHTML = `<strong>${ev['HORA PROGRAMADA INICIO'] || '--:--'}</strong> ${ev['IMPUTADO'] || 'N/A'}`;
            el.onclick = (e) => { e.stopPropagation(); showDetail(ev); };
            container.appendChild(el);
        });
        document.getElementById('calendarGrid').appendChild(cell);
    }

    function showDetail(ev) {
        const modal = document.getElementById('modal');
        const container = document.getElementById('modalContainer');
        document.getElementById('modalTitle').innerText = ev['IMPUTADO'] || 'Detalle';
        document.getElementById('modalSubtitle').innerText = ev['TIPO DE AUDIENCIA'] || 'Audiencia';
        document.getElementById('modalContent').innerHTML = fields.map(f => `
            <div class="bg-gray-50 p-3 rounded-lg border border-gray-100">
                <span class="text-[9px] uppercase font-bold text-gray-400 block tracking-widest">${f}</span>
                <span class="text-sm text-slate-700 font-semibold">${ev[f] || '—'}</span>
            </div>
        `).join('');
        modal.classList.remove('hidden');
        setTimeout(() => container.classList.replace('opacity-0', 'opacity-100'), 10);
    }

    function closeModal() {
        document.getElementById('modalContainer').classList.replace('opacity-100', 'opacity-0');
        setTimeout(() => document.getElementById('modal').classList.add('hidden'), 200);
    }

    function changeMonth(d) { currentViewDate.setMonth(currentViewDate.getMonth() + d); renderCalendar(); }
    function setToday() { currentViewDate = new Date(); renderCalendar(); }
    function applyFilters() { renderCalendar(); }
    window.onload = fetchData;
</script>
</body>
</html>
